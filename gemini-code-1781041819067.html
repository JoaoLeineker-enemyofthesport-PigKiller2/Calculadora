<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Real</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="calculator-container">
        <div class="forge-header">🪓 Ábaco do Alquimista 🔮</div>
        
        <div class="display-parchment">
            <div id="display">0</div>
        </div>

        <div class="buttons-grid">
            <button class="btn btn-clear" onclick="clearDisplay()">C</button>
            <button class="btn btn-op" onclick="appendOperator('/')">÷</button>
            <button class="btn btn-op" onclick="appendOperator('*')">×</button>
            <button class="btn btn-op" onclick="deleteLast()">⌫</button>

            <button class="btn" onclick="appendNumber('7')">VII</button>
            <button class="btn" onclick="appendNumber('8')">VIII</button>
            <button class="btn" onclick="appendNumber('9')">IX</button>
            <button class="btn btn-op" onclick="appendOperator('-')">-</button>

            <button class="btn" onclick="appendNumber('4')">IV</button>
            <button class="btn" onclick="appendNumber('5')">V</button>
            <button class="btn" onclick="appendNumber('6')">VI</button>
            <button class="btn btn-op" onclick="appendOperator('+')">+</button>

            <button class="btn" onclick="appendNumber('1')">I</button>
            <button class="btn" onclick="appendNumber('2')">II</button>
            <button class="btn" onclick="appendNumber('3')">III</button>
            
            <button class="btn btn-equal" onclick="calculate()">=</button>
            
            <button class="btn btn-zero" onclick="appendNumber('0')">0</button>
            <button class="btn" onclick="appendNumber('.')">.</button>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
